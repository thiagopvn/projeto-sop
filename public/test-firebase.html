<!DOCTYPE html>
<html>
<head>
    <title>Teste Firebase</title>
</head>
<body>
    <h1>Teste de Conexão Firebase</h1>
    <div id="status">Carregando...</div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWeThpt6h1Y3zxNenpGf7eTYPsUhVlgXI",
            authDomain: "projeto-sop.firebaseapp.com",
            projectId: "projeto-sop",
            storageBucket: "projeto-sop.appspot.com",
            messagingSenderId: "509243342498",
            appId: "1:509243342498:web:29e941f3e16e7eea7721fb",
            measurementId: "G-H0D0G5SD3V"
        };
        
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        document.getElementById('status').innerHTML = 'Firebase inicializado! Testando conexão...';
        
        // Teste de conexão
        db.collection('test').add({
            message: 'Hello from test',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById('status').innerHTML = 'Firebase conectado com sucesso!';
        }).catch((error) => {
            document.getElementById('status').innerHTML = 'Erro: ' + error.message;
        });
        
        // Teste de autenticação
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('status').innerHTML += '<br>Usuário logado: ' + user.email;
            } else {
                document.getElementById('status').innerHTML += '<br>Nenhum usuário logado';
            }
        });
    </script>
</body>
</html>
